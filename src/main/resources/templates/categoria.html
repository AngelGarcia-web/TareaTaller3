<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Categorías - Sistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primario: #6366f1;
            --fondo: #0f172a;
            --cristal: rgba(255, 255, 255, 0.03);
            --borde-cristal: rgba(255, 255, 255, 0.1);
            --peligro: #ef4444;
            --advertencia: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
            padding: 40px 20px;
            margin: 0;
        }

        .contenedor-personalizado {
            max-width: 1000px;
            margin: 0 auto;
        }

        .seccion-encabezado {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .acciones-encabezado {
            display: flex;
            gap: 15px;
            flex-grow: 1;
            max-width: 750px;
            justify-content: flex-end;
        }

        .formulario-busqueda {
            display: flex;
            gap: 10px;
            flex-grow: 1;
        }

        .contenedor-busqueda {
            position: relative;
            flex-grow: 1;
        }

        .contenedor-busqueda::before {
            content: '🔍';
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.5;
        }

        .entrada-busqueda {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: var(--cristal);
            border: 1px solid var(--borde-cristal);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
        }

        .tarjeta-cristal {
            background: var(--cristal);
            backdrop-filter: blur(12px);
            border: 1px solid var(--borde-cristal);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }

        .tabla-datos {
            width: 100%;
            border-collapse: collapse;
        }

        .tabla-datos th {
            background: rgba(255, 255, 255, 0.05);
            padding: 18px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
        }

        .tabla-datos td {
            padding: 18px;
            border-bottom: 1px solid var(--borde-cristal);
            font-size: 14px;
        }

        .texto-descripcion {
            color: #cbd5e1;
            font-style: italic;
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-primario {
            background: var(--primario);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            transition: transform 0.2s;
        }

        .btn-primario:hover { transform: translateY(-2px); }

        .btn-accion {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
        }

        .btn-editar { background: rgba(245, 158, 11, 0.1); color: var(--advertencia); border: 1px solid rgba(245, 158, 11, 0.3); }
        .btn-eliminar { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-volver {
            background: rgba(255, 255, 255, 0.05);
            color: #f8fafc;
            border: 1px solid var(--borde-cristal);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="contenedor-personalizado">

    <div class="seccion-encabezado">
        <h1 style="font-weight: 700; margin: 0;">Categorías</h1>
        <div class="acciones-encabezado">
            <form th:action="@{/categoria/buscar}" method="get" class="formulario-busqueda">
                <div class="contenedor-busqueda">
                    <input type="number" name="idCategoria" class="entrada-busqueda" placeholder="ID..." required>
                </div>
                <button type="submit" class="btn-primario">Buscar</button>
            </form>

            <a th:href="@{/home}" class="btn-volver">🏠 Inicio</a>

            <a th:href="@{/categoria/nuevo}" class="btn-primario">+ Nueva</a>
        </div>
    </div>

    <div th:if="${categoriaEncontrada != null}" class="tarjeta-cristal" style="border-color: var(--primario); margin-bottom: 40px;">
        <div style="padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(99, 102, 241, 0.1);">
            <h3 style="margin:0; font-size: 14px; color: var(--primario); font-weight: 700;">📍 DETALLES ENCONTRADOS</h3>
            <a th:href="@{/categoria}" class="btn-accion btn-volver" style="font-size: 11px; padding: 5px 10px;">Cerrar</a>
        </div>
        <table class="tabla-datos">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Acción</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td th:text="${categoriaEncontrada.idCategoria}" style="font-weight: bold; color: var(--primario);"></td>
                <td th:text="${categoriaEncontrada.nombreCategoria}" style="font-weight: 600;"></td>
                <td th:text="${categoriaEncontrada.descripcionCategoria != null ? categoriaEncontrada.descripcionCategoria : 'Sin descripción'}"></td>
                <td>
                    <a th:href="@{/categoria/editar/{id}(id=${categoriaEncontrada.idCategoria})}" class="btn-accion btn-editar">Editar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="tarjeta-cristal">
        <table class="tabla-datos">
            <thead>
            <tr>
                <th>ID</th>
                <th>NOMBRE</th>
                <th>DESCRIPCIÓN</th>
                <th style="text-align: right;">ACCIONES</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${categorias}">
                <td th:text="${c.idCategoria}" style="opacity: 0.6; font-weight: 700;"></td>
                <td th:text="${c.nombreCategoria}" style="font-weight: 600;"></td>
                <td>
                    <div class="texto-descripcion"
                         th:text="${c.descripcionCategoria != null ? c.descripcionCategoria : '---'}"
                         th:title="${c.descripcionCategoria}"></div>
                </td>
                <td style="text-align: right;">
                    <a th:href="@{/categoria/editar/{id}(id=${c.idCategoria})}" class="btn-accion btn-editar">Editar</a>
                    <a th:href="@{/categoria/eliminar/{id}(id=${c.idCategoria})}"
                       class="btn-accion btn-eliminar"
                       onclick="return confirm('¿Eliminar categoría?')">Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
