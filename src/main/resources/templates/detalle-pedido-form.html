<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${modoEdicion} ? 'Editar Detalle' : 'Nuevo Detalle'"></title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primario: #6366f1;
            --fondo: #0f172a;
            --cristal: rgba(255, 255, 255, 0.03);
            --borde-cristal: rgba(255, 255, 255, 0.1);
            --error: #f87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        .tarjeta-cristal {
            background: var(--cristal);
            backdrop-filter: blur(16px);
            border: 1px solid var(--borde-cristal);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 { text-align: center; margin: 0 0 10px 0; font-weight: 700; }
        .descripcion { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 30px; }

        .cuadricula-formulario {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .grupo-formulario {
            display: flex;
            flex-direction: column;
        }

        .grupo-formulario.ancho-completo {
            grid-column: span 2;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: #cbd5e1;
        }

        .entrada-formulario {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--borde-cristal);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .entrada-formulario:focus {
            outline: none;
            border-color: var(--primario);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .error-campo {
            border-color: var(--error) !important;
        }

        .mensaje-error {
            color: var(--error);
            font-size: 11px;
            margin-top: 5px;
            font-weight: 500;
        }

        .btn-enviar {
            width: 100%;
            padding: 14px;
            background: var(--primario);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
        }

        .btn-enviar:hover {
            transform: translateY(-2px);
            background: #4f46e5;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn-cancelar {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn-cancelar:hover { color: #f8fafc; }

        @media (max-width: 480px) {
            .cuadricula-formulario { grid-template-columns: 1fr; }
            .grupo-formulario.ancho-completo { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="tarjeta-cristal">
    <h2 th:text="${modoEdicion} ? 'Editar Detalle' : 'Nuevo Detalle'"></h2>
    <p class="descripcion">Complete la información del producto en el pedido</p>

    <form th:action="${modoEdicion} ? @{/detalle/actualizar/{id}(id=${detalle.idDetalle})} : @{/detalle/guardar}"
          th:object="${detalle}" method="post">

        <input type="hidden" th:field="*{idDetalle}">

        <div class="cuadricula-formulario">
            <div class="grupo-formulario">
                <label for="idPedido">ID Pedido</label>
                <input type="number" id="idPedido" th:field="*{idPedido}"
                       class="entrada-formulario"
                       th:classappend="${#fields.hasErrors('idPedido')} ? 'error-campo' : ''"
                       placeholder="Ej: 101" required>
                <div class="mensaje-error" th:if="${#fields.hasErrors('idPedido')}" th:errors="*{idPedido}"></div>
            </div>

            <div class="grupo-formulario">
                <label for="idProducto">ID Producto</label>
                <input type="number" id="idProducto" th:field="*{idProducto}"
                       class="entrada-formulario"
                       th:classappend="${#fields.hasErrors('idProducto')} ? 'error-campo' : ''"
                       placeholder="Ej: 50" required>
                <div class="mensaje-error" th:if="${#fields.hasErrors('idProducto')}" th:errors="*{idProducto}"></div>
            </div>

            <div class="grupo-formulario">
                <label for="cantidadDetalle">Cantidad</label>
                <input type="number" id="cantidadDetalle" th:field="*{cantidadDetalle}"
                       class="entrada-formulario"
                       th:classappend="${#fields.hasErrors('cantidadDetalle')} ? 'error-campo' : ''"
                       placeholder="1" min="1" required>
                <div class="mensaje-error" th:if="${#fields.hasErrors('cantidadDetalle')}" th:errors="*{cantidadDetalle}"></div>
            </div>

            <div class="grupo-formulario">
                <label for="precioDetalle">Precio Unitario</label>
                <input type="number" step="0.01" id="precioDetalle" th:field="*{precioDetalle}"
                       class="entrada-formulario"
                       th:classappend="${#fields.hasErrors('precioDetalle')} ? 'error-campo' : ''"
                       placeholder="0.00" min="0" required>
                <div class="mensaje-error" th:if="${#fields.hasErrors('precioDetalle')}" th:errors="*{precioDetalle}"></div>
            </div>
        </div>

        <button type="submit" class="btn-enviar"
                th:text="${modoEdicion} ? 'Actualizar Registro' : 'Guardar Registro'"></button>

        <a th:href="@{/detalle}" class="btn-cancel">← Cancelar y volver</a>
    </form>
</div>

</body>
</html>
