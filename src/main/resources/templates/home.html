<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Inicio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primario: #6366f1;
            --primario-hover: #4f46e5;
            --fondo-gradiente: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            --cristal-fondo: rgba(255, 255, 255, 0.03);
            --borde-cristal: rgba(255, 255, 255, 0.1);
            --texto-principal: #f8fafc;
            --texto-atenuado: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--fondo-gradiente);
            color: var(--texto-principal);
            padding: 20px;
        }

        .contenedor-principal {
            width: 100%;
            max-width: 550px;
        }

        .tarjeta-cristal {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--borde-cristal);
            border-radius: 28px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: entradaSuave 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes entradaSuave {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .circulo-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primario), #a855f7);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
            color: white;
        }

        .titulo-bienvenida {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .descripcion-sesion {
            font-size: 16px;
            color: var(--texto-atenuado);
            margin-bottom: 32px;
        }

        .nombre-usuario {
            color: #818cf8;
            font-weight: 600;
        }

        .cuadricula-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .boton-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 24px 20px;
            border-radius: 20px;
            text-decoration: none;
            background: var(--cristal-fondo);
            border: 1px solid var(--borde-cristal);
            color: var(--texto-principal);
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .boton-menu:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
            border-color: var(--primario);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .boton-menu span:first-child {
            font-size: 26px;
        }

        .seccion-salir {
            margin-top: 10px;
            border-top: 1px solid var(--borde-cristal);
            padding-top: 20px;
        }

        .btn-cerrar-sesion {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: transparent;
            color: #f87171;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-cerrar-sesion:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        @media (max-width: 480px) {
            .cuadricula-menu {
                grid-template-columns: 1fr;
            }
            .tarjeta-cristal {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

<div class="contenedor-principal">
    <div class="tarjeta-cristal">
        <div class="circulo-avatar">
            <span th:text="${#strings.substring(username,0,1).toUpperCase()}">U</span>
        </div>

        <h1 class="titulo-bienvenida">Bienvenido</h1>
        <p class="descripcion-sesion">
            Hola, <span class="nombre-usuario" th:text="${username}">Usuario</span>.
            Tu sesión está activa.
        </p>

        <div class="cuadricula-menu">
            <a class="boton-menu" th:href="@{/usuario}">
                <span>👤</span>
                <span>Usuarios</span>
            </a>
            <a class="boton-menu" th:href="@{/producto}">
                <span>📦</span>
                <span>Productos</span>
            </a>
            <a class="boton-menu" th:href="@{/pedido}">
                <span>🛒</span>
                <span>Pedidos</span>
            </a>
            <a class="boton-menu" th:href="@{/categoria}">
                <span>📂</span>
                <span>Categorías</span>
            </a>
            <a class="boton-menu" th:href="@{/detalle}" style="grid-column: span 2;">
                <span>📝</span>
                <span>Detalles de Pedidos</span>
            </a>
        </div>

        <div class="seccion-salir">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn-cerrar-sesion">
                    🚪 Finalizar Sesión
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
