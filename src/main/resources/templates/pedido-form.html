<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${modoEdicion} ? 'Editar Pedido' : 'Nuevo Pedido'"></title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primario: #6366f1;
            --fondo: #0f172a;
            --cristal: rgba(255, 255, 255, 0.03);
            --borde-cristal: rgba(255, 255, 255, 0.1);
            --error: #f87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        .tarjeta-cristal {
            background: var(--cristal);
            backdrop-filter: blur(16px);
            border: 1px solid var(--borde-cristal);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 { text-align: center; margin: 0 0 10px 0; font-weight: 700; color: #fff; }
        .descripcion { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 30px; }

        .grupo-formulario {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: #cbd5e1;
        }

        .entrada-formulario {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--borde-cristal);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .entrada-formulario:focus {
            outline: none;
            border-color: var(--primario);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .error-campo { border-color: var(--error) !important; }

        .mensaje-error {
            color: var(--error);
            font-size: 11px;
            margin-top: 5px;
            font-weight: 500;
        }

        .btn-enviar {
            width: 100%;
            padding: 14px;
            background: var(--primario);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn-enviar:hover {
            transform: translateY(-2px);
            background: #4f46e5;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn-cancelar {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn-cancelar:hover { color: #f8fafc; }
    </style>
</head>
<body>

<div class="tarjeta-cristal">
    <h2 th:text="${modoEdicion} ? 'Editar Pedido' : 'Nuevo Pedido'"></h2>
    <p class="descripcion">Gestione la información general del pedido</p>

    <form th:action="${modoEdicion} ? @{/pedido/actualizar/{id}(id=${pedido.idPedido})} : @{/pedido/guardar}"
          th:object="${pedido}"
          method="post">

        <input type="hidden" th:field="*{idPedido}">

        <div class="grupo-formulario">
            <label for="fechaPedido">Fecha del Pedido</label>
            <input type="date" id="fechaPedido"
                   th:field="*{fechaPedido}"
                   class="entrada-formulario"
                   th:classappend="${#fields.hasErrors('fechaPedido')} ? 'error-campo' : ''"
                   required>
            <div class="mensaje-error" th:if="${#fields.hasErrors('fechaPedido')}" th:errors="*{fechaPedido}"></div>
        </div>

        <div class="grupo-formulario">
            <label for="totalPedido">Monto Total</label>
            <input type="number" step="0.01" id="totalPedido"
                   th:field="*{totalPedido}"
                   class="entrada-formulario"
                   th:classappend="${#fields.hasErrors('totalPedido')} ? 'error-campo' : ''"
                   placeholder="0.00" min="0" required>
            <div class="mensaje-error" th:if="${#fields.hasErrors('totalPedido')}" th:errors="*{totalPedido}"></div>
        </div>

        <div class="grupo-formulario">
            <label for="idUsuario">ID Usuario Responsable</label>
            <input type="number" id="idUsuario"
                   th:field="*{idUsuario}"
                   class="entrada-formulario"
                   th:classappend="${#fields.hasErrors('idUsuario')} ? 'error-campo' : ''"
                   placeholder="Ingrese el ID del usuario" required>
            <div class="mensaje-error" th:if="${#fields.hasErrors('idUsuario')}" th:errors="*{idUsuario}"></div>
        </div>

        <button type="submit" class="btn-enviar" th:text="${modoEdicion} ? 'Actualizar Pedido' : 'Guardar Pedido'"></button>

        <a th:href="@{/pedido}" class="btn-cancel">← Cancelar y volver</a>
    </form>
</div>

</body>
</html>
