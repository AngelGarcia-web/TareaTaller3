<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Pedidos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primario: #6366f1;
            --fondo: #0f172a;
            --cristal: rgba(255, 255, 255, 0.03);
            --borde-cristal: rgba(255, 255, 255, 0.1);
            --peligro: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
            padding: 40px 20px;
            margin: 0;
        }

        .contenedor-personalizado {
            max-width: 1000px;
            margin: 0 auto;
        }

        .seccion-encabezado {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .acciones-encabezado {
            display: flex;
            gap: 15px;
            flex-grow: 1;
            max-width: 650px;
        }

        .formulario-busqueda {
            display: flex;
            gap: 10px;
            flex-grow: 1;
        }

        .contenedor-busqueda {
            position: relative;
            flex-grow: 1;
        }

        .contenedor-busqueda::before {
            content: '🔍';
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.5;
        }

        .entrada-busqueda {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: var(--cristal);
            border: 1px solid var(--borde-cristal);
            border-radius: 12px;
            color: white;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .entrada-busqueda:focus {
            outline: none;
            border-color: var(--primario);
            background: rgba(255,255,255,0.08);
        }

        .tarjeta-cristal {
            background: var(--cristal);
            backdrop-filter: blur(12px);
            border: 1px solid var(--borde-cristal);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }

        .tabla-datos {
            width: 100%;
            border-collapse: collapse;
        }

        .tabla-datos th {
            background: rgba(255, 255, 255, 0.05);
            padding: 18px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
        }

        .tabla-datos td {
            padding: 18px;
            border-bottom: 1px solid var(--borde-cristal);
        }

        .btn-nuevo {
            background: var(--primario);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            white-space: nowrap;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
        }

        .btn-nuevo:hover { transform: translateY(-2px); background: #4f46e5; }

        .btn-accion {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
            display: inline-block;
        }

        .btn-editar { background: rgba(245, 158, 11, 0.1); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }
        .btn-editar:hover { background: #f59e0b; color: white; }

        .btn-eliminar { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); margin-left: 8px; }
        .btn-eliminar:hover { background: #ef4444; color: white; }

        .btn-volver {
            background: rgba(255, 255, 255, 0.05);
            color: #f8fafc;
            border: 1px solid var(--borde-cristal);
            margin-left: 8px;
        }
        .btn-volver:hover { background: rgba(255, 255, 255, 0.1); }

        .alerta-error {
            padding: 15px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            color: #f87171;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .insignia-id { color: var(--primario); font-weight: bold; }
    </style>
</head>
<body>

<div class="contenedor-personalizado">
    <div class="seccion-encabezado">
        <h1 style="font-weight: 700; margin: 0; font-size: 28px;">Listado de Pedidos</h1>
        <div class="acciones-encabezado">
            <form th:action="@{/pedido/buscar}" method="get" class="formulario-busqueda">
                <div class="contenedor-busqueda">
                    <input type="number" name="idPedido" class="entrada-busqueda" placeholder="ID del pedido..." required>
                </div>
                <button type="submit" class="btn-nuevo" style="padding: 0 20px;">Buscar</button>
            </form>
            <a th:href="@{/pedido/nuevo}" class="btn-nuevo">+ Nuevo</a>
        </div>
    </div>

    <div th:if="${error != null}" class="alerta-error">
        <span th:text="${error}"></span>
        <a th:href="@{/pedido}" class="btn-nuevo" style="background: var(--peligro); padding: 5px 15px; font-size: 12px;">Ver todos</a>
    </div>

    <div th:if="${pedidoEncontrado != null}" class="tarjeta-cristal" style="border-color: var(--primario);">
        <div style="padding: 15px 18px; display: flex; justify-content: space-between; background: rgba(99, 102, 241, 0.05);">
            <h3 style="margin:0; font-size: 16px; color: var(--primario);">📍 Resultado de búsqueda:</h3>
            <a th:href="@{/pedido}" class="btn-accion btn-volver" style="font-size: 11px;">Limpiar Filtro</a>
        </div>
        <table class="tabla-datos">
            <thead>
            <tr>
                <th>ID Pedido</th>
                <th>Fecha</th>
                <th>Total</th>
                <th>ID Usuario</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td class="insignia-id" th:text="${pedidoEncontrado.idPedido}"></td>
                <td th:text="${pedidoEncontrado.fechaPedido}"></td>
                <td th:text="'$' + ${pedidoEncontrado.totalPedido}" style="font-weight: 600;"></td>
                <td th:text="${pedidoEncontrado.idUsuario}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="tarjeta-cristal">
        <table class="tabla-datos">
            <thead>
            <tr>
                <th>ID</th>
                <th>FECHA</th>
                <th>TOTAL</th>
                <th>USUARIO</th>
                <th style="text-align: right;">ACCIONES</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${pedidos}">
                <td class="insignia-id" th:text="${p.idPedido}"></td>
                <td th:text="${p.fechaPedido}"></td>
                <td th:text="'$' + ${p.totalPedido}" style="font-weight: 600;"></td>
                <td th:text="${p.idUsuario}"></td>
                <td style="text-align: right;">
                    <a th:href="@{/pedido/editar/{id}(id=${p.idPedido})}" class="btn-accion btn-editar">Editar</a>
                    <a th:href="@{/pedido/eliminar/{id}(id=${p.idPedido})}"
                       class="btn-accion btn-eliminar"
                       onclick="return confirm('¿Seguro que desea eliminar este pedido?')">Eliminar</a>
                    <a th:href="@{/home}" class="btn-accion btn-volver">Volver</a>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${pedidos.empty}" style="padding: 40px; text-align: center; color: #94a3b8;">
            No hay pedidos registrados en el sistema.
        </div>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <a th:href="@{/}" style="color: #94a3b8; text-decoration: none; font-size: 14px;">← Panel Principal</a>
    </div>
</div>

</body>
</html>
