<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${modoEdicion} ? 'Editar Usuario' : 'Nuevo Usuario'"></title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primario: #6366f1;
            --fondo: #0f172a;
            --cristal: rgba(255, 255, 255, 0.03);
            --borde-cristal: rgba(255, 255, 255, 0.1);
            --error: #f87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        .tarjeta-cristal {
            background: var(--cristal);
            backdrop-filter: blur(16px);
            border: 1px solid var(--borde-cristal);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: aparecer 0.5s ease-out;
        }

        @keyframes aparecer {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { text-align: center; margin: 0 0 10px 0; font-weight: 700; color: #fff; font-size: 24px; }
        .descripcion { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 30px; }

        .grupo-formulario {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: #cbd5e1;
            padding-left: 4px;
        }

        .entrada-formulario {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--borde-cristal);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .entrada-formulario:focus {
            outline: none;
            border-color: var(--primario);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .error-campo { border-color: var(--error) !important; }

        .mensaje-error {
            color: var(--error);
            font-size: 11px;
            margin-top: 5px;
            font-weight: 500;
            padding-left: 4px;
        }

        .btn-enviar {
            width: 100%;
            padding: 14px;
            background: var(--primario);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn-enviar:hover {
            transform: translateY(-2px);
            background: #4f46e5;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn-cancelar {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn-cancelar:hover { color: #f8fafc; }
    </style>
</head>
<body>

<div class="tarjeta-cristal">
    <h2 th:text="${modoEdicion} ? 'Editar Perfil de Usuario' : 'Registrar Nuevo Usuario'"></h2>
    <p class="descripcion">Complete la información del usuario en el sistema</p>

    <form th:action="${modoEdicion} ? @{/usuario/actualizar/{id}(id=${usuario.idUsuario})} : @{/usuario/guardar}"
          th:object="${usuario}"
          method="post">

        <input type="hidden" th:field="*{idUsuario}">

        <div class="grupo-formulario">
            <label for="nombreUsuario">Nombre</label>
            <input type="text" id="nombreUsuario"
                   th:field="*{nombreUsuario}"
                   class="entrada-formulario"
                   th:classappend="${#fields.hasErrors('nombreUsuario')} ? 'error-campo' : ''"
                   placeholder="Ej: Angel" required>
            <div class="mensaje-error" th:if="${#fields.hasErrors('nombreUsuario')}" th:errors="*{nombreUsuario}"></div>
        </div>

        <div class="grupo-formulario">
            <label for="apellidoUsuario">Apellido</label>
            <input type="text" id="apellidoUsuario"
                   th:field="*{apellidoUsuario}"
                   class="entrada-formulario"
                   th:classappend="${#fields.hasErrors('apellidoUsuario')} ? 'error-campo' : ''"
                   placeholder="Ej: García" required>
            <div class="mensaje-error" th:if="${#fields.hasErrors('apellidoUsuario')}" th:errors="*{apellidoUsuario}"></div>
        </div>

        <div class="grupo-formulario">
            <label for="edadUsuario">Edad</label>
            <input type="number" id="edadUsuario"
                   th:field="*{edadUsuario}"
                   class="entrada-formulario"
                   th:classappend="${#fields.hasErrors('edadUsuario')} ? 'error-campo' : ''"
                   placeholder="0" min="0" max="120" required>
            <div class="mensaje-error" th:if="${#fields.hasErrors('edadUsuario')}" th:errors="*{edadUsuario}"></div>
        </div>

        <button type="submit" class="btn-enviar"
                th:text="${modoEdicion} ? 'Actualizar Usuario' : 'Crear Usuario'"></button>

        <a th:href="@{/usuario}" class="btn-cancelar">← Cancelar y regresar</a>
    </form>
</div>

</body>
</html>
